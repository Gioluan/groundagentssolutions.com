<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="BusVivo. Gana más, gasta menos, en cada autobús.">
  <defs>
    <!-- Paper grain like .paper-grain on busvivo.com -->
    <pattern id="grain" width="38" height="46" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="9" r="0.9" fill="#0a1f3d" fill-opacity="0.06"/>
      <circle cx="26" cy="28" r="0.8" fill="#0a1f3d" fill-opacity="0.05"/>
      <circle cx="15" cy="38" r="0.9" fill="#0a1f3d" fill-opacity="0.06"/>
    </pattern>
    <style>
      .display { font-family: 'Bebas Neue', 'Arial Narrow', 'Helvetica Inserat', Impact, sans-serif; font-weight: 400; }
      .body    { font-family: 'Space Grotesk', system-ui, sans-serif; }
      .mono    { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
    </style>
  </defs>

  <!-- Paper background -->
  <rect width="600" height="360" fill="#f3ede0"/>
  <rect width="600" height="360" fill="url(#grain)"/>

  <!-- Top notice strip (ink navy with signal-yellow mono text) -->
  <g>
    <rect x="0" y="0" width="600" height="26" fill="#0a1f3d"/>
    <circle cx="20" cy="13" r="2.6" fill="#ffd400"/>
    <text x="30" y="17" class="mono" font-size="9" fill="#ffd400" letter-spacing="2.5" font-weight="700">SISTEMA EN LÍNEA · MADRID · 2026</text>
    <text x="580" y="17" class="mono" font-size="9" fill="#ffd400" fill-opacity="0.7" letter-spacing="2.5" text-anchor="end" font-weight="700">25 PLAZAS · SOCIOS FUNDADORES</text>
  </g>

  <!-- BUSVIVO logo tile (yellow box, navy ring + BUSVIVO wordmark) -->
  <g transform="translate(36,52)">
    <rect x="0" y="0" width="186" height="42" fill="#ffd400" stroke="#0a1f3d" stroke-width="2.5"/>
    <!-- Ringed dot (matches .Logo on busvivo.com) -->
    <circle cx="20" cy="21" r="6" fill="#ffd400" stroke="#0a1f3d" stroke-width="2"/>
    <circle cx="20" cy="21" r="3" fill="#0a1f3d"/>
    <!-- Wordmark -->
    <text x="36" y="33" class="display" font-size="30" fill="#0a1f3d" letter-spacing="1.2">BUSVIVO</text>
  </g>

  <!-- Mono tag "FLOTA / EN VIVO" beside logo -->
  <text x="234" y="80" class="mono" font-size="8.5" fill="#0a1f3d" letter-spacing="3" font-weight="700">FLOTA / EN VIVO</text>

  <!-- EN VIVO red badge + caption -->
  <g transform="translate(36,116)">
    <rect x="0" y="0" width="60" height="18" fill="#e3000f"/>
    <text x="30" y="13" class="mono" font-size="9" fill="#ffffff" letter-spacing="2.5" text-anchor="middle" font-weight="700">EN VIVO</text>
    <text x="72" y="13" class="mono" font-size="9" fill="#0a1f3d" fill-opacity="0.65" letter-spacing="2.5" font-weight="700">GPS DESDE EL MÓVIL · SIN HARDWARE</text>
  </g>

  <!-- Display headline: GANA MÁS. / GASTA MENOS. (yellow highlight) / EN CADA AUTOBÚS. -->
  <g class="display" fill="#0a1f3d">
    <text x="36" y="194" font-size="56" letter-spacing="-1">GANA MÁS.</text>
    <!-- Yellow signal highlight block behind GASTA MENOS. -->
    <rect x="32" y="208" width="320" height="48" fill="#ffd400"/>
    <text x="36" y="246" font-size="56" letter-spacing="-1">GASTA MENOS.</text>
    <text x="36" y="296" font-size="34" letter-spacing="-0.5" fill="#1a3055">EN CADA AUTOBÚS.</text>
  </g>

  <!-- Bottom stats strip on ink-navy (mimics busvivo.com stats row) -->
  <g transform="translate(0,316)">
    <rect x="0" y="0" width="600" height="44" fill="#0a1f3d"/>
    <!-- divider lines -->
    <rect x="200" y="10" width="1" height="24" fill="#ffd400" fill-opacity="0.35"/>
    <rect x="400" y="10" width="1" height="24" fill="#ffd400" fill-opacity="0.35"/>

    <!-- Stat 1 -->
    <text x="100" y="22" class="display" font-size="22" fill="#ffd400" text-anchor="middle">€3.000+</text>
    <text x="100" y="35" class="mono" font-size="7" fill="#f3ede0" fill-opacity="0.7" letter-spacing="2" text-anchor="middle" font-weight="700">AHORRO / BUS / AÑO</text>

    <!-- Stat 2 -->
    <text x="300" y="22" class="display" font-size="22" fill="#ffd400" text-anchor="middle">5 MIN</text>
    <text x="300" y="35" class="mono" font-size="7" fill="#f3ede0" fill-opacity="0.7" letter-spacing="2" text-anchor="middle" font-weight="700">INSTALACIÓN · SIN TÉCNICO</text>

    <!-- Stat 3 -->
    <text x="500" y="22" class="display" font-size="22" fill="#ffd400" text-anchor="middle">€0</text>
    <text x="500" y="35" class="mono" font-size="7" fill="#f3ede0" fill-opacity="0.7" letter-spacing="2" text-anchor="middle" font-weight="700">HARDWARE · NUNCA</text>
  </g>
</svg>
